# Ecosystem workspace: the cyphertap library (git submodule) + apps that consume it.
packages:
  - cyphertap
  - apps/*

allowBuilds:
  '@parcel/watcher': true
  '@tailwindcss/oxide': true
  esbuild: true
  sharp: true

# Keep in sync with cyphertap/pnpm-workspace.yaml (used when cyphertap is
# consumed standalone): the NDK companion packages pin ndk exactly; force the
# single version the other NDK packages resolve to.
overrides:
  "@nostr-dev-kit/ndk": 2.15.2
