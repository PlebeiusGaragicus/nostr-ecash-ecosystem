name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Frozen lockfile failing on submodule-pointer / lockfile drift is a
      # feature: it catches unsynced cyphertap bumps.
      - name: Install
        run: pnpm install --frozen-lockfile

      # Apps resolve cyphertap types from its dist/, which is gitignored —
      # build the library before type-checking anything that imports it.
      - name: Build library dist
        run: pnpm build:lib

      - name: Type check (library + apps)
        run: pnpm check

      - name: Build apps
        run: pnpm --filter './apps/*' build
